<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Fox Performance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --card:#171717;
  --border:#262626;
  --amber:#FF8C42;
  --amber-dim:#C25E1E;
  --cyan:#4FC3F7;
  --cyan-dim:#1E6B8A;
  --white:#f0f0f0;
  --gray:#8a8a8a;
  --faint:#5a5a5a;
  --font-head:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--font-body);min-height:100dvh;overflow-x:hidden}
body{max-width:520px;margin:0 auto;position:relative}

/* sutil textura/atmosfera de fundo */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 30% 12%, rgba(255,140,66,.06), transparent 42%),
    radial-gradient(circle at 72% 88%, rgba(79,195,247,.05), transparent 42%);
}

/* ============ SPLASH ============ */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .5s}
#splash img{width:104px;filter:drop-shadow(0 0 34px rgba(255,140,66,.22));animation:splashLogo 1s cubic-bezier(.2,.8,.2,1)}
@keyframes splashLogo{0%{opacity:0;transform:scale(.8) translateY(10px)}100%{opacity:1;transform:none}}
#splash h1{font-family:var(--font-head);font-size:2.9rem;letter-spacing:3px;font-weight:800;line-height:.9;animation:splashFade 1.1s ease .15s both}
#splash span{font-family:var(--font-head);font-size:.92rem;letter-spacing:6px;color:var(--gray);font-weight:600;animation:splashFade 1.1s ease .3s both}
@keyframes splashFade{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:none}}
#splash.hide{opacity:0;pointer-events:none}
#splash.gone{display:none}

/* ============ ENTRADA ============ */
/* ============ ENTRADA — escala modular (razão áurea φ≈1.618) ============
   Base = 1rem (16px). Escala: cada degrau × 1.618 (ou ÷ 1.618).
   xs .47 · sm .62 · base .76/1 · md 1.27 · lg 2.06 · xl 3.33
   Logo, tipografia, espaços e cartões derivam desta progressão. */
#entry{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:0 26px;opacity:0;transition:opacity .6s}
#entry.show{opacity:1}

/* topo: bloco de marca com DESTAQUE — protagonista da tela */
.entry-top{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:14vh;animation:entryIn .8s cubic-bezier(.2,.8,.2,1)}
@keyframes entryIn{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:none}}
.entry-logo{width:108px;filter:drop-shadow(0 0 32px rgba(255,140,66,.2));margin-bottom:16px}
.entry-brand{font-family:var(--font-head);font-size:3rem;font-weight:800;letter-spacing:4px;line-height:.85}
.entry-brand .perf{display:block;font-size:.9rem;letter-spacing:10px;color:var(--gray);font-weight:600;margin-top:8px}
.entry-divider{width:48px;height:2px;background:linear-gradient(90deg,var(--amber),var(--cyan));border-radius:2px;margin:24px 0 18px;opacity:.6}
.entry-greeting{font-family:var(--font-head);font-size:1.7rem;font-weight:700;letter-spacing:.5px}
.entry-sub{font-size:.95rem;color:var(--gray);margin-top:5px;font-weight:400}

/* cartões: discretos, mais finos e estreitos, centralizados abaixo */
.modules{width:100%;max-width:340px;margin:48px auto 0;display:flex;flex-direction:column;gap:12px}
.module-card{
  position:relative;display:flex;align-items:center;gap:13px;
  background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:13px 15px;cursor:pointer;overflow:hidden;
  transition:transform .2s cubic-bezier(.2,.8,.2,1), border-color .25s, box-shadow .25s;
  animation:cardIn .7s cubic-bezier(.2,.8,.2,1) both;
}
.module-card:nth-child(1){animation-delay:.15s}
.module-card:nth-child(2){animation-delay:.28s}
@keyframes cardIn{0%{opacity:0;transform:translateY(22px)}100%{opacity:1;transform:none}}
.module-card:active{transform:scale(.975)}

.module-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;transition:.25s}
.module-card.training::before{background:linear-gradient(180deg,var(--amber),var(--amber-dim))}
.module-card.nutri::before{background:linear-gradient(180deg,var(--cyan),var(--cyan-dim))}
.module-card.training:active,.module-card.training:hover{border-color:var(--amber-dim);box-shadow:0 8px 30px -12px rgba(255,140,66,.4)}
.module-card.nutri:active,.module-card.nutri:hover{border-color:var(--cyan-dim);box-shadow:0 8px 30px -12px rgba(79,195,247,.4)}

/* ícone do cartão menor, condizente com botão fino */
.mc-logo{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--surface)}
.mc-logo svg{width:24px;height:24px}
.module-card.training .mc-logo{box-shadow:inset 0 0 0 1px rgba(255,140,66,.25)}
.module-card.nutri .mc-logo{box-shadow:inset 0 0 0 1px rgba(79,195,247,.25)}

.mc-text{flex:1;min-width:0}
.mc-name{font-family:var(--font-head);font-size:1.05rem;font-weight:700;letter-spacing:.8px;line-height:1}
.module-card.training .mc-name{color:var(--amber)}
.module-card.nutri .mc-name{color:var(--cyan)}
.mc-desc{font-size:.72rem;color:var(--gray);margin-top:2px;font-weight:400}
.mc-arrow{color:var(--faint);font-size:1.15rem;transition:.25s;flex-shrink:0}
.module-card:active .mc-arrow{transform:translateX(3px)}

/* rodapé */
.entry-foot{margin-top:auto;padding:30px 14px 28px;text-align:center;font-size:.7rem;color:var(--faint);line-height:1.7;animation:cardIn .7s ease .42s both;letter-spacing:.2px}
.entry-foot b{color:var(--gray);font-weight:600}

.module-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:600;background:var(--bg);display:none}
.module-frame.active{display:block}
body.in-module #entry{display:none}

.module-card.drive::before{background:linear-gradient(180deg,#4FC3F7,#1E6B8A)}
.module-card.drive:active,.module-card.drive:hover{border-color:#1E6B8A;box-shadow:0 8px 30px -12px rgba(79,195,247,.4)}
</style>
</head>
<body>

<div id="splash">
  <img id="splashLogo" alt="Fox Performance">
  <h1>FOX</h1>
  <span>PERFORMANCE</span>
</div>

<div id="entry">
  <div class="entry-top">
    <img class="entry-logo" id="entryLogo" alt="Fox Performance">
    <div class="entry-brand">FOX<span class="perf">PERFORMANCE</span></div>
    <div class="entry-divider"></div>
    <div class="entry-greeting" id="greeting">Olá, Rafael</div>
    <div class="entry-sub">Bem-vindo ao seu espaço Fox</div>
  </div>

  <div class="modules">
    <div class="module-card training" onclick="openModule('training')">
      <div class="mc-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
          <!-- halter -->
          <rect x="3" y="18" width="6" height="12" rx="1.5" fill="#FF8C42"/>
          <rect x="9" y="14" width="5" height="20" rx="1.5" fill="#FF8C42"/>
          <rect x="14" y="21" width="20" height="6" rx="2" fill="#FF8C42"/>
          <rect x="34" y="14" width="5" height="20" rx="1.5" fill="#FF8C42"/>
          <rect x="39" y="18" width="6" height="12" rx="1.5" fill="#FF8C42"/>
        </svg>
      </div>
      <div class="mc-text">
        <div class="mc-name">TRAINING</div>
        <div class="mc-desc">Seus treinos e progressão</div>
      </div>
      <div class="mc-arrow">›</div>
    </div>

    <div class="module-card nutri" onclick="openModule('nutri')">
      <div class="mc-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
          <!-- maçã -->
          <path d="M24 14c-3-4-9-4-11.5-1C9 16.5 9.5 24 13 30c2 3.5 4 5 6 5 1.2 0 2-.5 3-.5s1.8.5 3 .5c2 0 4-1.5 6-5 3.5-6 4-13.5.5-17-2.5-3-8.5-3-11.5 1z" fill="#4FC3F7"/>
          <path d="M24 14c0-3 1.5-5.5 4.5-6.5" stroke="#1E6B8A" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="29" cy="9" rx="3" ry="2" fill="#1E6B8A" transform="rotate(-30 29 9)"/>
        </svg>
      </div>
      <div class="mc-text">
        <div class="mc-name">NUTRITRACKER</div>
        <div class="mc-desc">Sua alimentação e metas</div>
      </div>
      <div class="mc-arrow">›</div>
    </div>

    <div class="module-card drive" onclick="openModule('drive')" style="animation-delay:.41s">
      <div class="mc-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="30" height="30">
          <path d="M8 14a3 3 0 013-3h8l3 4h13a3 3 0 013 3v14a3 3 0 01-3 3H11a3 3 0 01-3-3V14z" fill="#4FC3F7" opacity=".7"/>
          <path d="M8 20h32v11a3 3 0 01-3 3H11a3 3 0 01-3-3V20z" fill="#4FC3F7"/>
          <path d="M18 26h12M18 30h8" stroke="#0a0a0a" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="mc-text">
        <div class="mc-name" style="color:#4FC3F7">MINHA ÁREA</div>
        <div class="mc-desc">Documentos, fotos e evolução</div>
      </div>
      <div class="mc-arrow">›</div>
    </div>
  </div>

  <div class="entry-foot">
    Os aplicativos <b>Training</b> e <b>NutriTracker</b> são de uso<br>
    exclusivo dos <b>membros</b> da consultoria Fox Performance.
  </div>
</div>

// injeta logo no splash e no topo da entrada
["splashLogo","entryLogo"].forEach(id=>{
  document.getElementById(id).src = FOX_LOGO_SRC;
});
document.getElementById("greeting").textContent = "Olá, " + CLIENT_NAME;

// splash -> entrada
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    const sp = document.getElementById("splash");
    sp.classList.add("hide");
    setTimeout(()=>{ sp.classList.add("gone"); document.getElementById("entry").classList.add("show"); }, 500);
  }, 1700);
});

// abre o módulo escolhido (iframe isolado)
function openModule(which){
  const frame = document.getElementById(which==="training" ? "frame-training" : "frame-nutri");
  document.querySelectorAll(".module-frame").forEach(f=>f.classList.remove("active"));
  frame.classList.add("active");
  document.body.classList.add("in-module");
  try{ history.pushState({module:which},"",location.href); }catch(e){}
}
function backToHub(){
  document.querySelectorAll(".module-frame").forEach(f=>f.classList.remove("active"));
  document.body.classList.remove("in-module");
}
// botão "voltar" interno dos apps avisa por postMessage
window.addEventListener("message", (e)=>{ if(e.data==="fox-back") backToHub(); });
// botão voltar físico do Android: se estiver num módulo, volta ao hub
window.addEventListener("popstate", ()=>{ if(document.body.classList.contains("in-module")) backToHub(); });
</script>

<script>
(function(){
  function b64decode(str){
    var bin=atob(str),buf=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(buf);
  }
  function init(){
    ['training','nutri','drive'].forEach(function(key){
      var dataEl=document.getElementById('data-'+key);
      var frameEl=document.getElementById('frame-'+key);
      if(!dataEl||!frameEl)return;
      var html=b64decode(dataEl.textContent.trim());
      var blob=new Blob([html],{type:'text/html;charset=utf-8'});
      frameEl.src=URL.createObjectURL(blob);
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  }else{init();}
})();
</script>
